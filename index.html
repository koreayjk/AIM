}

async function sbFetch(path, method='GET', body=null, useAuth=true, extraHeaders={}) {
  const buildHeaders = () => {
    const h = { 'Content-Type': 'application/json', 'apikey': SB_KEY, ...extraHeaders };
    h['Authorization'] = (useAuth && _authToken) ? 'Bearer ' + _authToken : 'Bearer ' + SB_KEY;
    return h;
  };
  let res = await fetch(SB_URL + path, { method, headers: buildHeaders(), body: body ? JSON.stringify(body) : null });
  // 401/403이면 세션 갱신 후 재시도
  if (res.status === 401 || res.status === 403) {
    const refreshed = await refreshSession();
    if (refreshed) {
      res = await fetch(SB_URL + path, { method, headers: buildHeaders(), body: body ? JSON.stringify(body) : null });
    }
  }
  return res.json();
}

async function refreshSession() {
  try {
    const session = JSON.parse(localStorage.getItem('imvoca.session') || '{}');
    const refreshToken = session.refresh_token;
    if (!refreshToken) return false;
    const res = await fetch(SB_URL + '/auth/v1/token?grant_type=refresh_token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
      body: JSON.stringify({ refresh_token: refreshToken })
    });
    const data = await res.json();
    if (data.access_token) {
      _authToken = data.access_token;
      localStorage.setItem('imvoca.session', JSON.stringify(data));
      return true;
    }
    return false;
  } catch(e) { return false; }
}

// ── 페이지 정렬 함수 ──
function pageSort(a, b) {
  const ROMAN = ['i','ii','iii','iv','v','vi','vii','viii','ix','x','xi','xii','xiii','xiv','xv','xvi','xvii','xviii','xix','xx',
                 'xxi','xxii','xxiii','xxiv','xxv','intro','preface','prologue','foreword','appendix'];
  const aStr = String(a.num).toLowerCase().trim();
  const bStr = String(b.num).toLowerCase().trim();
  const aRoman = ROMAN.indexOf(aStr);
  const bRoman = ROMAN.indexOf(bStr);
  const aNum = parseInt(a.num);
  const bNum = parseInt(b.num);
  const aIsNum = !isNaN(aNum) && String(aNum) === String(a.num).trim();
  const bIsNum = !isNaN(bNum) && String(bNum) === String(b.num).trim();

  // 로마숫자/특수단어 → 맨 앞
  if (aRoman >= 0 && bRoman >= 0) return aRoman - bRoman;
  if (aRoman >= 0) return -1;
  if (bRoman >= 0) return 1;
  // 둘 다 숫자 → 숫자 순
  if (aIsNum && bIsNum) return aNum - bNum;
  // 숫자 → 문자 앞
  if (aIsNum) return -1;
  if (bIsNum) return 1;
  // 나머지는 문자열 비교
  return aStr.localeCompare(bStr);
}

async function loadUserPlan() {
  try {
    const res = await fetch(SB_URL + `/rest/v1/members?id=eq.${currentUser.id}&select=plan,scan_count,stripe_customer_id,visit_count,org_id,org_role,org_status`, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + _authToken }
    });
    const data = await res.json();
    if (data[0]) {
      userPlan = data[0].plan || 'free';
      userScanCount = data[0].scan_count || 0;
      userDailyScanCount = data[0].daily_scan_count || 0;
      userDailyScanDate = data[0].daily_scan_date || null;
      userStripeId = data[0].stripe_customer_id || '';
      userOrgId = data[0].org_id || null;
      userOrgRole = data[0].org_role || null;
      userOrgStatus = data[0].org_status || null;
      if (userOrgRole === 'owner' || userOrgId) { await loadMyOrg(); }
      // 최종 접속 시각(last_seen_at)은 매번 갱신, 누적 접속수(visit_count)는 하루 1회만 증가
      const today = new Date().toISOString().slice(0,10);
      const isNewDay = localStorage.getItem('imvoca.lastVisitDay') !== today;
      const visitPatch = { last_seen_at: new Date().toISOString() };
      if (isNewDay) visitPatch.visit_count = (data[0].visit_count||0) + 1;
      sbFetch(`/rest/v1/members?id=eq.${currentUser.id}`, 'PATCH', visitPatch,
        true, { 'Prefer': 'return=representation' })
        .then(r => { if (isNewDay && Array.isArray(r) && r.length) localStorage.setItem('imvoca.lastVisitDay', today); })
        .catch(()=>{});
    }
  } catch(e) {}
}

// 책별 복습 상태 캐시 { "bookId|pageNum": "done"|"doing" }
let _reviewStatus = {};
let _reviewStatusLoaded = {}; // 책별로 이미 불러왔는지
async function loadReviewStatus(bookId) {
  if (_reviewStatusLoaded[bookId]) return; // 이미 불러왔으면 다시 안 함
  _reviewStatusLoaded[bookId] = true;
  try {
    const res = await fetch(SB_URL + `/rest/v1/voca_review?user_id=eq.${currentUser.id}&book_id=eq.${bookId}&select=page_num,completed`, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + _authToken }
    });
    const data = await res.json();
    let changed = false;
    if (Array.isArray(data)) {
      data.forEach(r => {
        const key = bookId + '|' + r.page_num;
        const val = r.completed ? 'done' : 'doing';
        if (_reviewStatus[key] !== val) { _reviewStatus[key] = val; changed = true; }
      });
    }
    // 실제로 새 상태가 생겼고, 지금 그 책 화면이면 한 번만 다시 그림
    if (changed && stack[stack.length-1]?.name === 'book' && stack[stack.length-1]?.bookId === bookId) render();
  } catch(e) { _reviewStatusLoaded[bookId] = false; console.error('[복습 상태 로드 실패]', e); }
}

async function deletePageWord(bookId, pageNum, wordIdx) {
  const book = findBook(bookId);
  const page = book ? findPage(book, pageNum) : null;
  if (!page) return;
  const word = page.words[wordIdx];
  if (!word) return;
  const ko = userNativeLang === 'ko';
  if (!confirm(ko ? `"${word.en}" 단어를 삭제할까요?` : `Delete "${word.en}"?`)) return;
  try {
    if (word.id) {
      await fetch(SB_URL + `/rest/v1/voca_words?id=eq.${word.id}`, {
        method: 'DELETE',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + _authToken }
      });
    }
page.words.splice(wordIdx, 1);
    updateTotalWords();
    render();
    toast(ko ? '삭제됐어요' : 'Deleted');
  } catch(e) { toast(ko ? '삭제 실패' : 'Delete failed'); }
}

function getLastNoticeView() {
  return Number(localStorage.getItem('imvoca.lastNoticeView') || 0);
}
function unreadNoticeCount() {
  const last = getLastNoticeView();
  return _notices.filter(n => new Date(n.created_at).getTime() > last).length;
}
function updateNoticeBadge() {
  const el = document.getElementById('notice-badge');
  if (!el) return;
  const cnt = unreadNoticeCount();
  if (cnt > 0) { el.textContent = cnt > 9 ? '9+' : cnt; el.style.display = 'flex'; }
  else { el.style.display = 'none'; }
}
function toggleNotice(idx) {
  const item = document.querySelector(`.notice-item[data-idx="${idx}"]`);
  if (!item) return;
  const body = item.querySelector('.notice-body');
  const chev = item.querySelector('.notice-chevron');
  if (!body) return;
  const isOpen = body.style.maxHeight !== '0px' && body.style.maxHeight !== '';
  if (isOpen) {
    body.style.maxHeight = '0px';
    body.style.marginTop = '0';
    if (chev) chev.style.transform = 'rotate(0deg)';
  } else {
    body.style.maxHeight = 'none';
    body.style.marginTop = '8px';
    if (chev) chev.style.transform = 'rotate(180deg)';
  }
}

// ─── 공지 이모지 반응 ───
const NOTICE_EMOJIS = ['👍','❤️','🎉','👏','🔥'];
let _noticeReactions = {}; // { noticeId: { emoji: { count, mine } } }

async function loadNoticeReactions(noticeIds) {
  _noticeReactions = {};
  const ids = (noticeIds||[]).filter(x => x!=null);
  if (!ids.length) return;
  try {
    const inList = ids.map(id => `"${String(id)}"`).join(',');
    const res = await fetch(SB_URL + `/rest/v1/voca_notice_reactions?notice_id=in.(${inList})&select=notice_id,user_id,emoji`, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + _authToken }
    });
    const rows = await res.json();
    if (!Array.isArray(rows)) return;
    rows.forEach(r => {
      const nid = String(r.notice_id);
      (_noticeReactions[nid] = _noticeReactions[nid] || {});
      const slot = (_noticeReactions[nid][r.emoji] = _noticeReactions[nid][r.emoji] || { count:0, mine:false });
      slot.count++;
      if (r.user_id === currentUser?.id) slot.mine = true;
    });
  } catch(e) {}
}

function reactionBar(notice) {
  const nid = String(notice.id);
  const data = _noticeReactions[nid] || {};
  return `<div class="notice-reactions" data-nid="${nid}" style="display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;" onclick="event.stopPropagation()">
    ${NOTICE_EMOJIS.map(em => {
      const r = data[em] || { count:0, mine:false };
      return `<button onclick="toggleReaction('${nid}','${em}')" style="display:inline-flex;align-items:center;gap:3px;border:1px solid ${r.mine?'var(--accent)':'var(--ink-12)'};background:${r.mine?'var(--gold-bg)':'var(--bg-card)'};border-radius:99px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:var(--font-body);line-height:1;">${em}${r.count>0?`<span style="font-size:10px;font-weight:700;color:${r.mine?'var(--accent)':'var(--ink-60)'};">${r.count}</span>`:''}</button>`;
    }).join('')}
  </div>`;
}

function updateReactionBarUI(nid) {
  const bar = document.querySelector(`.notice-reactions[data-nid="${nid}"]`);
  if (bar) bar.outerHTML = reactionBar({ id: nid });
}

async function toggleReaction(noticeId, emoji) {
  if (!currentUser) { toast(userNativeLang==='ko'?'로그인이 필요해요':'Please log in'); return; }
  const nid = String(noticeId);
  (_noticeReactions[nid] = _noticeReactions[nid] || {});
  const r = (_noticeReactions[nid][emoji] = _noticeReactions[nid][emoji] || { count:0, mine:false });
  const wasMine = r.mine;
  r.mine = !wasMine; r.count = Math.max(0, r.count + (wasMine ? -1 : 1));
  updateReactionBarUI(nid);
  const baseHdr = () => ({ 'Content-Type':'application/json', 'apikey':SB_KEY, 'Authorization':'Bearer '+_authToken });
  const doFetch = async (path, opts) => {
    let res = await fetch(SB_URL + path, opts);
    if ((res.status===401||res.status===403) && await refreshSession()) { opts.headers.Authorization = 'Bearer '+_authToken; res = await fetch(SB_URL + path, opts); }
    return res;
  };
  try {
    let res;
    if (wasMine) {
      res = await doFetch(`/rest/v1/voca_notice_reactions?notice_id=eq.${encodeURIComponent(nid)}&user_id=eq.${currentUser.id}&emoji=eq.${encodeURIComponent(emoji)}`, { method:'DELETE', headers: baseHdr() });
    } else {
      res = await doFetch('/rest/v1/voca_notice_reactions', { method:'POST', headers: { ...baseHdr(), 'Prefer':'return=minimal' }, body: JSON.stringify({ notice_id: nid, user_id: currentUser.id, emoji }) });
    }
    if (!res.ok) throw new Error('reaction write failed');
  } catch(e) {
    r.mine = wasMine; r.count = Math.max(0, r.count + (wasMine ? 1 : -1)); updateReactionBarUI(nid);
    toast(userNativeLang==='ko'?'잠시 후 다시 시도해주세요':'Please try again');
  }
}

async function incrementScanCount() {

// 스캔 가능 여부 체크
function _todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function isOrgBillingActive(){ return !!(userOrg && userOrg.billing_active); }
function isOrgStudentActive(){ return !!(userOrgId && userOrgRole==='student' && userOrgStatus==='approved' && isOrgBillingActive()); }
function dailyScansToday(){ return (userDailyScanDate===_todayStr()) ? userDailyScanCount : 0; }
function canScan() {
  if (userPlan === 'premium') return true;
  // 결제중 학원의 관리자(owner): 무제한
  if (userOrgRole==='owner' && isOrgBillingActive()) return true;
  // 결제중 학원의 승인 학생: 총 누적 제한 면제, 일일 제한만 적용
  if (isOrgStudentActive()) return dailyScansToday() < STUDENT_DAILY_LIMIT;
  return userScanCount < FREE_SCAN_LIMIT;
}

// ── 비밀번호 재설정 토큰 감지 ──
function checkRecoveryToken() {
  // hash와 search 둘 다 확인
  const hash = window.location.hash || '';
  const search = window.location.search || '';
  const raw = hash.startsWith('#') ? hash.substring(1) : hash;

  if (!raw) return false;

  const params = new URLSearchParams(raw);
  const type = params.get('type');
  const error = params.get('error');

  // 에러 감지
  if (error) {
    history.replaceState(null, '', window.location.pathname);
    setTimeout(() => {
      renderLogin();
      toast('⚠️ 링크가 만료됐어요. 비밀번호 찾기를 다시 시도해주세요.');
    }, 300);
    return true;
  }

  // recovery 타입 확인
  if (type !== 'recovery') return false;

  const accessToken = params.get('access_token');
  if (!accessToken) return false;

  // URL 깔끔하게
  history.replaceState(null, '', window.location.pathname);
  _authToken = accessToken;
  showNewPasswordForm();
  return true;
}

async function promoteStudentToCoAdmin(id){

  try{
    await sbFetch(`/rest/v1/members?id=eq.${id}`,'PATCH',{org_role:'owner',org_status:'approved'},true,{'Prefer':'return=representation'});

    loadOrgStudents();
  }catch(e){ toast(ko?'임명 실패 (주 관리자만 가능)':'Failed'); }

async function demoteCoAdmin(id){

  try{
    await sbFetch(`/rest/v1/members?id=eq.${id}`,'PATCH',{org_role:'student',org_status:'approved'},true,{'Prefer':'return=representation'});
    toast(ko?'공동 관리자를 해지했어요':'Removed');

async function regenerateOrgCode(){
  if (!userOrg) return;
  if (!confirm(userNativeLang==='ko'?'새 코드를 발급할까요?\n기존 코드로는 더 이상 가입할 수 없어요. (이미 가입한 학생은 그대로예요)':'Regenerate code? The old code will stop working.')) return;
  const code = 'IMV-' + Math.random().toString(36).substring(2,7).toUpperCase();
  try {
    const r = await sbFetch(`/rest/v1/orgs?id=eq.${userOrg.id}`, 'PATCH', { code }, true, {'Prefer':'return=representation'});
    if (!(Array.isArray(r) && r[0])) { toast(userNativeLang==='ko'?'재발급 실패':'Failed'); return; }
    userOrg.code = code;
    toast(userNativeLang==='ko'?'✅ 새 코드가 발급됐어요':'New code issued');
    stack=[{name:'org-admin'}]; render();
  } catch(e){ toast('오류: '+e.message); }
}

async function removeStudent(id){
  if (!confirm(userNativeLang==='ko'?'이 학생을 단체에서 내보낼까요?\n(학생 계정과 단어는 유지되고, 단체 소속만 해제돼요)':'Remove this student from the org?')) return;
  try {
    await sbFetch(`/rest/v1/members?id=eq.${id}`, 'PATCH', { org_id: null, org_role: null, org_status: 'approved' }, true, {'Prefer':'return=representation'});
    toast(userNativeLang==='ko'?'학생을 내보냈어요':'Removed');
    loadOrgStudents();
  } catch(e){ toast(userNativeLang==='ko'?'실패':'Failed'); }
}

async function openStudentDetail(id){
  const ko = userNativeLang==='ko';
  const meCache = (window._orgStudentsList||[]).find(x=>x.id===id);
  const name = meCache ? meCache.name : '';
  const overlay = document.createElement('div');
  overlay.id = 'student-detail-modal';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:18px;';
  overlay.innerHTML = `<div style="background:var(--bg-card);border-radius:18px;max-width:460px;width:100%;max-height:85vh;overflow-y:auto;padding:22px;"><div style="text-align:center;color:var(--ink-60);font-size:13px;padding:30px;">${ko?'불러오는 중...':'Loading...'}</div></div>`;
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
  document.body.appendChild(overlay);
  const card = overlay.firstElementChild;
  try {
    const books = await sbFetch(`/rest/v1/voca_books?user_id=eq.${id}&select=*,voca_pages(*,voca_words(*))&order=created_at`);
    let reviews = [];
    try { const rv = await sbFetch(`/rest/v1/voca_review?user_id=eq.${id}&select=book_id,page_num,completed`); if(Array.isArray(rv)) reviews=rv; } catch(e){}
    const revMap = {}; reviews.forEach(r=>{ revMap[r.book_id+'|'+r.page_num] = r.completed?'done':'doing'; });
    const list = Array.isArray(books)?books:[];
    const totalWords = list.reduce((n,b)=>n+(b.voca_pages||[]).reduce((mm,p)=>mm+(p.voca_words||[]).length,0),0);
    let bodyHtml;
    if (!list.length) bodyHtml = `<div style="text-align:center;color:var(--ink-45);font-size:13px;padding:24px;">${ko?'아직 등록한 책이 없어요':'No books yet'}</div>`;
    else bodyHtml = list.map(b=>{
      const pages = (b.voca_pages||[]).slice().sort((x,y)=>(x.page_num+'').localeCompare(y.page_num+'',undefined,{numeric:true}));
      const wc = pages.reduce((mm,p)=>mm+(p.voca_words||[]).length,0);
      const donePages = pages.filter(p=>revMap[b.id+'|'+p.page_num]==='done').length;
      return `
        <div style="border:1px solid var(--ink-07);border-radius:12px;padding:12px 14px;margin-bottom:10px;">
          <div style="font-weight:700;color:var(--ink-100);font-size:14px;">${esc(b.title||(ko?'(제목없음)':'(untitled)'))}</div>
          <div class="muted" style="font-size:11px;margin-bottom:8px;">${esc(b.author||'')}${b.author?' · ':''}${ko?'단어':'Words'} ${wc} · ${ko?'복습완료':'Done'} ${donePages}/${pages.length}p</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;">
            ${pages.map(p=>{ const st=revMap[b.id+'|'+p.page_num]; const c= st==='done'?'#1c3553': st==='doing'?'#e23d3d':'var(--ink-12)'; const tc= st?'#fff':'var(--ink-60)'; return `<span style="font-size:9px;padding:2px 6px;border-radius:99px;background:${c};color:${tc};">${esc(String(p.page_num))}·${(p.voca_words||[]).length}</span>`; }).join('')}
          </div>
        </div>`;
    }).join('');
    card.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <div style="font-family:var(--font-serif-ko);font-size:18px;font-weight:700;color:var(--ink-100);">👤 ${esc(name||'')}</div>
        <button onclick="document.getElementById('student-detail-modal').remove()" style="background:none;border:none;font-size:18px;color:var(--ink-45);cursor:pointer;">✕</button>
      </div>
      <div class="muted" style="font-size:12px;margin-bottom:14px;">${ko?'책':'Books'} ${list.length} · ${ko?'총 단어':'Total'} ${totalWords} · <span style="color:#1c3553;">●</span>${ko?'완료':'done'} <span style="color:#e23d3d;">●</span>${ko?'진행':'doing'}</div>
      ${bodyHtml}`;
  } catch(e){
    card.innerHTML = `<div style="text-align:center;color:var(--ink-45);font-size:13px;padding:24px;">${ko?'불러오지 못했어요 (권한 정책 확인)':'Failed to load'}</div><div style="text-align:center;"><button onclick="document.getElementById('student-detail-modal').remove()" style="margin-top:10px;background:var(--bg-input);border:1px solid var(--ink-12);border-radius:8px;padding:8px 16px;cursor:pointer;font-family:var(--font-body);">${ko?'닫기':'Close'}</button></div>`;
  }
}

async function saveMyPassword() {
  const ko = userNativeLang === 'ko';
  const pw = document.getElementById('info-pw1')?.value;

  if (!pw || pw.length < 6) { toast(ko?'비밀번호는 6자 이상이어야 해요':'Password must be 6+ characters'); return; }
  if (pw !== pw2) { toast(ko?'비밀번호가 일치하지 않아요':'Passwords do not match'); return; }
  try {
    const res = await fetch(SB_URL + '/auth/v1/user', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + _authToken },
      body: JSON.stringify({ password: pw })
    });
    const data = await res.json();
    if (data.id) {
      document.getElementById('info-modal')?.remove();
      toast(ko?'✅ 비밀번호가 변경됐어요!':'✅ Password changed!');
    } else {
      toast(data.msg || (ko?'변경 실패. 다시 시도해주세요':'Failed. Please try again'));

}

let _deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredInstallPrompt = e;
});

function setupInstallBanner(isStandalone) {
  // 이미 앱으로 설치해서 쓰는 중이면 안 띄움
  if (isStandalone) return;
  // 최근에 닫았으면 7일간 안 띄움
  const dismissed = localStorage.getItem('imvoca.installDismissed');
  if (dismissed && (Date.now() - Number(dismissed)) < 7*24*60*60*1000) return;

  const ua = navigator.userAgent || '';
  const isIOS = /iphone|ipad|ipod/i.test(ua);
  const isAndroid = /android/i.test(ua);
  // 모바일이 아니면(데스크톱) 안내 불필요
  if (!isIOS && !isAndroid) return;

  const banner = document.getElementById('install-banner');
  const titleEl = document.getElementById('install-title');
  const descEl = document.getElementById('install-desc');
  const btnEl = document.getElementById('install-action-btn');
  if (!banner) return;

  const ko = userNativeLang === 'ko';
  if (isIOS) {
    // 아이폰: 자동 설치 버튼이 없어서 방법을 안내
    titleEl.textContent = ko ? '📲 홈 화면에 추가하세요' : '📲 Add to Home Screen';
    descEl.innerHTML = ko
      ? '사파리 아래쪽 <b>공유 버튼</b>을 누르고<br>“홈 화면에 추가”를 선택하세요.'
      : 'Tap the <b>Share</b> button below,<br>then “Add to Home Screen”.';
    btnEl.style.display = 'none';
  } else {
    // 안드로이드: 설치 버튼 제공
    titleEl.textContent = ko ? '📲 앱으로 설치하세요' : '📲 Install the app';
    descEl.textContent = ko ? '홈 화면에서 앱처럼 빠르게 열 수 있어요.' : 'Open it like an app from your home screen.';
    btnEl.textContent = ko ? '설치하기' : 'Install';
    btnEl.style.display = 'block';
  }
  // 3초 후 띄우기 (들어오자마자 방해되지 않게)
  setTimeout(() => { banner.classList.add('show'); }, 3000);
}

function dismissInstall() {
  const b = document.getElementById('install-banner');
  if (b) b.classList.remove('show');
  localStorage.setItem('imvoca.installDismissed', String(Date.now()));
}

async function triggerInstall() {
  if (_deferredInstallPrompt) {
    _deferredInstallPrompt.prompt();
    const { outcome } = await _deferredInstallPrompt.userChoice;
    _deferredInstallPrompt = null;
    if (outcome === 'accepted') dismissInstall();
  } else {
    toast(userNativeLang==='ko' ? '브라우저 메뉴에서 “홈 화면에 추가”를 눌러주세요' : 'Use "Add to Home Screen" in your browser menu');
  }
}

async function sbInit() {
  initDarkMode();
  // 앱 모드 vs 브라우저 모드 감지
  const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  document.documentElement.style.setProperty('--ox-bottom', isStandalone ? '16px' : '90px');
  document.documentElement.style.setProperty('--ox-hint-bottom', isStandalone ? '0px' : '70px');
  setupInstallBanner(isStandalone);

  // ── 비밀번호 재설정 토큰 체크 (최우선) ──
  if (checkRecoveryToken()) return;

  // 저장된 세션이 있으면 로그인 화면 대신 로딩 표시 (깜빡임 방지)
  const hasSavedSession = !!localStorage.getItem('imvoca.session');
  if (hasSavedSession) {
    document.getElementById('root').innerHTML = '<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg-page);gap:18px;"><img src="https://imvoca.app/2.png" style="width:96px;height:96px;object-fit:contain;border-radius:22px;box-shadow:0 6px 24px rgba(28,53,83,0.15);animation:imvocaPulse 1.6s ease-in-out infinite;"><div style="font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--accent);letter-spacing:0.02em;">IM VOCA</div></div>';
  } else {
    renderLogin();
  }

  // ── 데모 링크 토큰 감지 ──
  const urlParams = new URLSearchParams(window.location.search);
  const demoToken = urlParams.get('demo');
  if (demoToken) {
    // URL에서 토큰 제거 (주소창 깔끔하게)
    window.history.replaceState({}, '', window.location.pathname);
    await loginWithDemoToken(demoToken);
    return;
  }

  const saved = localStorage.getItem('imvoca.session');
  if (saved) {
    try {
      const sess = JSON.parse(saved);
      if (!sess.access_token || !sess.user) { localStorage.removeItem('imvoca.session'); return; }
      const verify = await fetch(SB_URL + '/auth/v1/user', {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + sess.access_token }
      });
      if (!verify.ok) { localStorage.removeItem('imvoca.session'); renderLogin(); return; }
      const userData = await verify.json();
      _authToken = sess.access_token;
      currentUser = userData;
      await Promise.all([
        loadApiKey(),
        loadUserName(),
        loadUserPlan(),
        loadBooksFromDB(),
        loadNotices()
      ]);
      await maybeSeedSampleBook();
      applyEntryStack();
      render();
      // 렌더 후 배지 업데이트 (상단 버튼이 그려진 다음)
      setTimeout(updateNoticeBadge, 100);
      setTimeout(checkReviews, 1000);
    } catch(e) {
      console.error('세션 복원 실패:', e);
      localStorage.removeItem('imvoca.session');
      renderLogin();
    }
  }
}


// ── 데모 링크로 로그인 ──
async function loginWithDemoToken(code) {
  try {
    // 로딩 표시
    document.getElementById('root').innerHTML = `
      <div class="scr" style="justify-content:center;align-items:center;gap:16px;">
        <div class="ring"></div>
        <div style="text-align:center">
          <div style="font-size:15px;font-weight:600;color:var(--ink-100);">${userNativeLang==='ko'?'입장 중...':'Entering...'}</div>
          <div class="muted" style="font-size:12px;margin-top:4px;">${userNativeLang==='ko'?'잠깐만 기다려주세요':'Please wait a moment'}</div>
        </div>
      </div>`;

    // DB에서 코드로 토큰 조회
    const res = await fetch(SB_URL + `/rest/v1/demo_links?code=eq.${code}&select=*`, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    const data = await res.json();

    if (!data?.length) { toast('유효하지 않은 링크예요'); renderLogin(); return; }

    const { access_token, expires_at } = data[0];

    // 만료 확인
    if (new Date() > new Date(expires_at)) {
      toast('링크가 만료됐어요. 새 링크를 받아주세요');
      renderLogin();
      return;
    }

    // 토큰 유효성 서버 확인
    const verify = await fetch(SB_URL + '/auth/v1/user', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + access_token }
    });
    if (!verify.ok) { toast('유효하지 않은 링크예요'); renderLogin(); return; }

    const userData = await verify.json();
    _authToken = access_token;
    currentUser = userData;

    // 세션 저장
    localStorage.setItem('imvoca.session', JSON.stringify({ access_token, user: userData }));

    toast('✅ 입장했어요!');
    await loadApiKey();
    await loadUserName();
    await loadUserPlan();
    await loadBooksFromDB();
    applyEntryStack();
    render();
    setTimeout(checkReviews, 1000);
  } catch(e) {
    toast('링크 오류: ' + e.message);
    renderLogin();
  }
}

async function generateDemoLink() {
  if (!_authToken) { toast('로그인 상태가 아니에요'); return; }

  toast('링크 생성 중...');

  // 6자리 랜덤 코드 생성
  const code = Math.random().toString(36).substring(2, 8).toUpperCase();
  const expires_at = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString();

  try {
    // Supabase demo_links 테이블에 저장
    const res = await fetch(SB_URL + '/rest/v1/demo_links', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + _authToken,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ code, access_token: _authToken, expires_at })
    });

}

async function sbSignIn(email, pw) {
  // 로딩 상태 표시
  const btn = document.querySelector('.btn-solid');
  const emailEl = document.getElementById('li-em');
  const pwEl = document.getElementById('li-pw');
  if (btn) { btn.disabled = true; btn.innerHTML = `<span style="display:inline-flex;align-items:center;gap:8px;"><span style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin 0.8s linear infinite;"></span>${userNativeLang==='ko'?'로그인 중...':'Logging in...'}</span>`; }
  if (emailEl) emailEl.disabled = true;
  if (pwEl) pwEl.disabled = true;
  try {
    const data = await sbFetch('/auth/v1/token?grant_type=password', 'POST', { email, password: pw }, false);
    if (data.error || !data.access_token) {
      toast('로그인 실패: 이메일 또는 비밀번호를 확인해주세요');
      if (btn) { btn.disabled = false; btn.textContent = '로그인'; }
      if (emailEl) emailEl.disabled = false;
      if (pwEl) { pwEl.disabled = false; pwEl.value = ''; pwEl.focus(); }
      return;
    }
    _authToken = data.access_token; currentUser = data.user;
    localStorage.setItem('imvoca.session', JSON.stringify({ access_token: data.access_token, user: data.user }));
    if (btn) btn.innerHTML = `<span style="display:inline-flex;align-items:center;gap:8px;"><span style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin 0.8s linear infinite;"></span>${userNativeLang==='ko'?'불러오는 중...':'Loading...'}</span>`;
    await loadApiKey(); await loadUserName();
    if (currentUser.email !== 'koreayjk@gmail.com') {
      try {
        const res = await fetch(SB_URL + `/rest/v1/members?id=eq.${currentUser.id}&select=role`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + _authToken } });
        const roleData = await res.json();
        const role = roleData[0]?.role;
        if (role === '대기중') {
          toast('아직 승인 대기 중이에요. 관리자 승인 후 사용 가능해요');
          _authToken = null; currentUser = null;
          localStorage.removeItem('imvoca.session');
          if (btn) { btn.disabled = false; btn.textContent = '로그인'; }
          if (emailEl) emailEl.disabled = false;
          if (pwEl) pwEl.disabled = false;
          return;
        }
      } catch(e) {}
    }
    await loadBooksFromDB(); await loadUserPlan(); await maybeSeedSampleBook(); applyEntryStack(); render(); setTimeout(checkReviews, 1000);
  } catch(e) {
    toast('로그인 오류: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '로그인'; }
    if (emailEl) emailEl.disabled = false;
    if (pwEl) pwEl.disabled = false;
  }
}

async function maybeSeedSampleBook(){
  try{
    if(!currentUser||!currentUser.id) return;
    if(Array.isArray(books)&&books.length>0) return;

    if(localStorage.getItem(flag)) return;
    localStorage.setItem(flag,'1');
    const pack=sampleBookData(userNativeLang||'ko');
    const bookRes=await sbFetch('/rest/v1/voca_books','POST',{user_id:currentUser.id,title:pack.title,author:pack.author,color:pack.color,description:pack.desc,cover_url:''},true,{'Prefer':'return=representation'});
    const book=Array.isArray(bookRes)?bookRes[0]:bookRes;
    if(!book||!book.id) return;

async function sbSignUp(email, pw, name, acctType='personal', orgCode='') {
  // 입력값 검증
  if (!name?.trim()) { toast(userNativeLang==='ko'?'이름을 입력해주세요':'Please enter your name'); return; }
  if (!email?.trim()) { toast(userNativeLang==='ko'?'이메일을 입력해주세요':'Please enter your email'); return; }
  if (!email.includes('@')) { toast(userNativeLang==='ko'?'올바른 이메일을 입력해주세요':'Please enter a valid email'); return; }
  if (!pw?.trim()) { toast(userNativeLang==='ko'?'비밀번호를 입력해주세요':'Please enter a password'); return; }
  if (pw.length < 6) { toast(userNativeLang==='ko'?'비밀번호는 6자 이상이어야 해요':'Password must be at least 6 characters'); return; }
  // 학생용 학원 코드가 있으면 먼저 확인 (학원장 가입은 코드 불필요)
  let org = null;
  const codeTrim = (orgCode||'').trim().toUpperCase();
  if (acctType !== 'owner' && codeTrim) {
    org = await lookupOrgByCode(codeTrim);
    if (!org) { toast(userNativeLang==='ko'?'단체 코드를 찾을 수 없어요. 코드를 확인해주세요':'Org code not found. Please check the code.'); return; }
  }
  try {
    const data = await sbFetch('/auth/v1/signup', 'POST', { email, password: pw, data: { name } }, false);
    if (data.error) { toast('가입 실패: ' + data.error.message); return; }
    if (data.user?.id) {
      const body = { id: data.user.id, name, email, role: '멤버', plan: 'free', scan_count: 0 };
      if (acctType === 'owner') { body.org_role = 'owner'; body.org_status = 'pending'; }
      else if (org) { body.org_id = org.id; body.org_role = 'student'; body.org_status = 'pending'; }
      const mRes = await fetch(SB_URL + '/rest/v1/members', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Prefer': 'return=minimal' },
        body: JSON.stringify(body)
      });
      if (!mRes.ok) {
        const errTxt = await mRes.text();
        console.error('[members 저장 실패]', mRes.status, errTxt);
        toast('계정은 생성됐지만 회원정보 저장에 실패했어요. 관리자에게 문의해주세요.');
      }
    } else {
      console.error('[회원가입] user.id 없음 - 이메일 인증 대기 상태일 수 있음', data);
    }
    let msg;
    if (acctType === 'owner') msg = userNativeLang==='ko'?'단체 관리자 가입 신청 완료! 승인 후 단체를 만들 수 있어요 😊':'Org admin signup submitted! Create your organization after approval.';
    else if (org) msg = userNativeLang==='ko'?`가입 완료! '${org.name}' 승인 후 이용할 수 있어요 😊`:`Signed up! Active after '${org.name}' approves you.`;
    else msg = userNativeLang==='ko'?'가입 완료! 바로 로그인해서 사용할 수 있어요 😊':'Signed up! Log in to start.';
    toast(msg);
    window._suType = 'personal';
    renderLogin('login');
  } catch(e) { toast('가입 오류: ' + e.message); }
}

async function sbSignOut() {
  localStorage.removeItem('imvoca.session');
  _authToken = null; currentUser = null; books = []; renderLogin();
}

async function loadBooksFromDB() {
  try {
    // 책 + 페이지 + 단어를 한 번에 (embed)
    const bd = await sbFetch(`/rest/v1/voca_books?user_id=eq.${currentUser.id}&select=*,voca_pages(*,voca_words(*))&order=created_at`);
    if (!Array.isArray(bd)) return;
    books = bd.map(b => ({
      id: b.id, title: b.title, author: b.author, color: b.color,
      desc: b.description || '', cover: b.cover_url || '',
      pages: (b.voca_pages || [])
        .sort((a,c) => (a.page_num+'').localeCompare(c.page_num+'', undefined, { numeric: true }))
        .map(p => ({
          num: p.page_num, _pid: p.id,
          words: (p.voca_words || [])
            .sort((a,c) => new Date(a.created_at) - new Date(c.created_at))
            .map(w => ({ id: w.id, en: w.en, ipa: w.ipa||'', base: w.base, ctx: w.ctx, sentence: w.sentence||'', level: w.level||'', fav: w.is_favorite||false }))
        }))
}));
    updateTotalWords();
  } catch(e) { console.error('DB load error:', e); }
}

async function saveBookToDB(title, author, color, desc, cover='') {
  try {
    const data = await sbFetch('/rest/v1/voca_books', 'POST',
      { user_id:currentUser.id, title, author, color, description:desc, cover_url:cover },
      true, { 'Prefer': 'return=representation' });
    if (data.code || data.error) { toast('DB 오류: ' + (data.message || data.error)); return null; }
    return Array.isArray(data) ? data[0] : data;
  } catch(e) { toast('저장 오류: ' + e.message); return null; }
}

  // CEFR 난이도별 가중치
  const WEIGHTS = { 'A2': 1, 'B1': 2, 'B2': 3, 'C1': 4, 'C2': 5 };
  return words.reduce((sum, w) => sum + (WEIGHTS[w.level] || 1), 0);
}

async function updateTotalWords() {
  if (!currentUser) return;
  try {
    // 전체 단어 가중치 점수(CEFR) 계산 → members.total_words에 저장
    const totalScore = books.reduce((sum, b) =>
      sum + b.pages.reduce((s, p) =>
        s + calcWordScore(p.words), 0), 0);
    await sbFetch(`/rest/v1/members?id=eq.${currentUser.id}`, 'PATCH', { total_words: totalScore });
  } catch(e) {}
}

async function savePageWordsToDB(bookId, pageNum, words) {
  try {
    const book = findBook(bookId);
    let pageId;
    const ex = book?.pages.find(p => String(p.num) === String(pageNum));
    if (ex?._pid) { pageId = ex._pid; }
    else {
      const data = await sbFetch('/rest/v1/voca_pages', 'POST',
        { book_id:bookId, page_num:String(pageNum) },
        true, { 'Prefer': 'return=representation' });
      pageId = (Array.isArray(data) ? data[0] : data)?.id;
    }
    if (!pageId) return null;
    for (const w of words) {
      await sbFetch('/rest/v1/voca_words', 'POST',
        { page_id:pageId, en:w.en, ipa:w.ipa||'', base:w.base, ctx:w.ctx, sentence:w.sentence||'', level:w.level||'' });
    }
    return pageId;
  } catch(e) { return null; }
}

<script>
// ── Gemini API 모델 폴백 + 재시도 ──
const GEMINI_MODELS = ['gemini-2.5-flash', 'gemini-2.5-flash-lite'];
let _geminiModelIdx = 0;

// Gemini 응답에서 단어 목록을 최대한 견고하게 추출 (JSON이 잘려도 완성된 단어는 모두 살림)
// Gemini 응답에서 AI가 읽은 페이지 번호만 추출 (없으면 '')
function parsePageNum(rawText) {
  const clean = (rawText || '').replace(/```json|```/g, '').trim();
  // 정상 JSON에서 page 필드
  try {
    const p = JSON.parse(clean);
    if (p && typeof p.page !== 'undefined' && p.page !== null) return String(p.page).trim();
  } catch(e) {}
  // JSON이 깨졌어도 page 필드만 정규식으로
  const m = clean.match(/"page"\s*:\s*"([^"]*)"/);
  if (m) return m[1].trim();
  const m2 = clean.match(/"page"\s*:\s*(\d+)/);
  if (m2) return m2[1].trim();
  return '';
}

function parseWordsRobust(rawText) {
  const clean = (rawText || '').replace(/```json|```/g, '').trim();
  // 1차: 정상 JSON 시도
  try {
    const p = JSON.parse(clean);
    if (p.words && p.words.length) return p.words;
  } catch(e) {}
  // 2차: 마지막 불완전 객체만 잘라내고 닫기
  try {
    let fixed = clean.replace(/,?\s*\{[^}]*$/, '').replace(/,\s*$/, '');
    if (!fixed.endsWith(']}')) {
      if (!fixed.includes(']')) fixed += ']';
      if (!fixed.endsWith('}')) fixed += '}';
    }
    const p = JSON.parse(fixed);
    if (p.words && p.words.length) return p.words;
  } catch(e) {}
  // 3차: 완성된 단어 객체를 통째로 정규식으로 추출 (가장 견고)
  const words = [];
  const objRe = /\{[^{}]*?"en"\s*:\s*"([^"]+)"[^{}]*?\}/g;
  let m;
  while ((m = objRe.exec(clean)) !== null) {
    const block = m[0];
    const en = (block.match(/"en"\s*:\s*"([^"]+)"/) || [])[1] || '';
    const base = (block.match(/"base"\s*:\s*"([^"]+)"/) || [])[1] || '';
    const ctx = (block.match(/"ctx"\s*:\s*"([^"]+)"/) || [])[1] || '';
    const level = (block.match(/"level"\s*:\s*"([^"]+)"/) || [])[1] || '';
    const sentence = (block.match(/"sentence"\s*:\s*"([^"]+)"/) || [])[1] || '';
    if (en) words.push({ en, base, ctx, sentence, level });
  }
  if (words.length) return words;
  // 4차: 객체 매칭도 실패하면 en 필드만이라도 순서대로 긁기
  const ens = clean.match(/"en"\s*:\s*"([^"]+)"/g) || [];
  const bases = clean.match(/"base"\s*:\s*"([^"]+)"/g) || [];
  const ctxs = clean.match(/"ctx"\s*:\s*"([^"]+)"/g) || [];
  const levels = clean.match(/"level"\s*:\s*"([^"]+)"/g) || [];
  const sents = clean.match(/"sentence"\s*:\s*"([^"]+)"/g) || [];
  return ens.map((e, i) => ({
    en: e.match(/"en"\s*:\s*"([^"]+)"/)[1],
    base: bases[i] ? bases[i].match(/"base"\s*:\s*"([^"]+)"/)[1] : '',
    ctx: ctxs[i] ? ctxs[i].match(/"ctx"\s*:\s*"([^"]+)"/)[1] : '',
    sentence: sents[i] ? sents[i].match(/"sentence"\s*:\s*"([^"]+)"/)[1] : '',
    level: levels[i] ? levels[i].match(/"level"\s*:\s*"([^"]+)"/)[1] : ''
  }));
}

async function geminiWithRetry(body, maxRetry=7) {
  const totalModels = GEMINI_MODELS.length;
  let lastError = null;
  for (let attempt = 0; attempt < maxRetry; attempt++) {
    const modelIdx = (_geminiModelIdx + attempt) % totalModels;
    const model = GEMINI_MODELS[modelIdx];
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    try {
      const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      const data = await res.json();
      if (data.error) {
        const code = data.error.code, msg = data.error.message||'';
        const isRetryable = code===429||code===503||msg.includes('demand')||msg.includes('quota')||msg.includes('overloaded')||msg.includes('unavailable')||msg.includes('busy');
        if (isRetryable && attempt < maxRetry-1) {
          const nextModel = GEMINI_MODELS[(modelIdx+1)%totalModels];
          toast(`⚡ ${model} 혼잡 → ${nextModel} 전환 중...`);
          await new Promise(r=>setTimeout(r,2000)); continue;
        }
        return data;
      }
      _geminiModelIdx = modelIdx; return data;
    } catch(e) {
      lastError = e;
      if (attempt < maxRetry-1) { toast('네트워크 오류. 재시도 중...'); await new Promise(r=>setTimeout(r,3000)); }
    }
  }
  throw lastError || new Error('모든 모델 시도 실패');
}

async function openCamera() {
  if (!window._cameraShots) window._cameraShots = [];
  const area = document.getElementById('camera-area');
  const video = document.getElementById('camera-video');
  const isMobile = /iphone|ipad|ipod|android/i.test(navigator.userAgent);
  if (isMobile) {
    video.style.width = '100%'; video.style.aspectRatio = '3/4'; video.style.maxHeight = ''; video.style.objectFit = 'cover';
  } else {
    video.style.width = '100%'; video.style.aspectRatio = '16/9'; video.style.maxHeight = ''; video.style.objectFit = 'cover';
  }
  try {
    const constraints = isMobile
      ? { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1080 }, height: { ideal: 1440 } } }
      : { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } };
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream; area.style.display = 'block'; window._cameraStream = stream;
  } catch(e) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream; area.style.display = 'block'; window._cameraStream = stream;
    } catch(e2) { toast('카메라 접근 권한이 필요해요'); }
  }
  updateCameraCounter();
}

function handleFileChange(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  if (files.length > 10) { toast('최대 10장까지만 선택할 수 있어요'); return; }
  const readers = files.map(f => new Promise(resolve => {
    const img = new Image(), r = new FileReader();
    r.onload = ev => {
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 1200; let w = img.width, h = img.height;
        if (w > MAX || h > MAX) { if (w > h) { h = Math.round(h*MAX/w); w=MAX; } else { w=Math.round(w*MAX/h); h=MAX; } }
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(f);
  }));
  Promise.all(readers).then(dataUrls => {
    if (dataUrls.length === 1) {
      imgData = dataUrls[0];
      window._multiImgData = null;
      renderUploadPreview();
    } else {
      window._multiImgData = dataUrls;
      imgData = null;
      renderMultiPreview(dataUrls);
    }
  });
}

async function doMultiScan() {
  const bId = document.getElementById('up-book-sel')?.value;
  if (!bId) { toast('책을 먼저 선택해주세요'); return; }
  const dataUrls = window._multiImgData;
  if (!dataUrls?.length) return;
  window._multiQueue = [...dataUrls];
  window._multiTotal = dataUrls.length;
  window._multiImgData = null; // 원본 배열 참조 해제 → 장을 처리할 때마다 메모리 회수됨
  window._multiIdx = 0;
  window._multiBookId = bId;
  window._multiAccumWords = [];
  window._multiPageNums = [];
  window._multiLastPage = '';
  await processNextMultiScan();
}

async function processNextMultiScan() {
  // 스캔 제한 체크 (멀티스캔 첫 장에서만)
  // 무료 스캔 제한: 매 장마다 확인 (멀티에서 제한 우회 방지)
  if (!canScan()) {
    if ((window._multiAccumWords||[]).length) { await finalizeMultiScan(); }
    else { window._multiImgData = null; window._multiAccumWords = []; window._multiPageNums = []; window._multiLastPage = ''; }
    handleScanBlocked();
    return;
  }
  const idx = window._multiIdx;
  const total = window._multiTotal || 0;
  const bId = window._multiBookId;
  if (idx >= total) {
    await finalizeMultiScan();
    return;
  }
  const currentImg = window._multiQueue[idx];
  window._multiQueue[idx] = null;
  renderScanLoading(idx+1, total);
  let words;
  try {
    const b64 = currentImg.split(',')[1], mt = currentImg.split(';')[0].split(':')[1];
    const data = await geminiWithRetry({ contents:[{parts:[{inline_data:{mime_type:mt,data:b64}},{text:buildScanPrompt(false)}]}], generationConfig:{temperature:0.1,maxOutputTokens:8192} });
    if (data.error) {
      if (data.error.code===403) { toast('API 키를 확인해주세요'); render(); return; }
      toast(userNativeLang==='ko'?`${idx+1}번 사진 처리 실패, 건너뛰어요`:`Photo ${idx+1} failed, skipping`);
      window._multiIdx++; await processNextMultiScan(); return;
    }
    if (!data.candidates?.[0]) { toast(userNativeLang==='ko'?`${idx+1}번 사진 응답 오류, 건너뛰어요`:`Photo ${idx+1} no response, skipping`); window._multiIdx++; await processNextMultiScan(); return; }
    const txt = data.candidates[0].content.parts[0].text;
    words = parseWordsRobust(txt);
    if (!words?.length) { toast(userNativeLang==='ko'?`${idx+1}번 사진에서 단어를 찾지 못했어요, 건너뛰어요`:`No words in photo ${idx+1}, skipping`); window._multiIdx++; await processNextMultiScan(); return; }
    window._aiPageNum = parsePageNum(txt);
  } catch(e) { toast(userNativeLang==='ko'?`${idx+1}번 사진 네트워크 오류, 건너뛰어요`:`Photo ${idx+1} network error, skipping`); window._multiIdx++; await processNextMultiScan(); return; }
  await incrementScanCount();
  pendingW = words; pendingB = bId; pendingP = null;
  renderWordSelectionMulti(words, idx, total);
}

async function saveMultiWords(idx, total) {
  const btn = document.getElementById('save-words-btn');
  if (btn?.disabled) return;
  const pg = document.getElementById('multi-pg-inp')?.value.trim();
  const selected = pendingW.filter((_, i) => window._wordSelected[i]);
  // 페이지마다 저장하지 않고, 고른 단어를 모았다가 마지막에 한 페이지로 합침
  window._multiAccumWords = window._multiAccumWords || [];
  window._multiPageNums = window._multiPageNums || [];
  if (selected.length) window._multiAccumWords.push(...selected);
  if (pg) { window._multiPageNums.push(pg); window._multiLastPage = pg; }
  if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }
  window._multiIdx = idx + 1;
  await processNextMultiScan();
}

// 멀티 스캔 마무리: 모은 단어를 하나의 페이지(범위 제목)로 저장
async function finalizeMultiScan() {
  const bId = window._multiBookId;
  const all = window._multiAccumWords || [];
  const book = findBook(bId);
  if (!all.length || !book) {
    toast(userNativeLang==='ko'?'저장된 단어가 없어요':'No words saved');
    window._multiImgData=null; window._multiAccumWords=[]; window._multiPageNums=[]; window._aiPageNum='';
    stack = [{ name:'library' }, { name:'book', bookId:bId }];
    render(); return;
  }
  // 입력된 페이지 번호로 범위 제목 만들기 (처음-끝)
  const nums = (window._multiPageNums||[]).filter(x=>x);
  let title;
  if (nums.length >= 2 && nums[0] !== nums[nums.length-1]) title = `${nums[0]}-${nums[nums.length-1]}`;
  else if (nums.length >= 1) title = `${nums[0]}`;
  else title = userNativeLang==='ko' ? '묶음' : 'group';
  // 같은 제목이 이미 있으면 뒤에 번호
  let finalTitle = title, n = 2;
  while (book.pages.some(p => String(p.num) === finalTitle)) finalTitle = `${title}-${n++}`;
  renderScanLoading();
  const pid = await savePageWordsToDB(bId, finalTitle, all);
  const words = all.map((w,i) => ({...w, id:`${bId}-${finalTitle}-${i+1}`}));
  book.pages.push({ num: finalTitle, _pid: pid, words });
  book.pages.sort((a,b)=>pageSort(a,b));
  updateTotalWords();
  window._multiImgData=null; window._multiAccumWords=[]; window._multiPageNums=[]; window._aiPageNum='';
  toast(userNativeLang==='ko'?`✅ Page ${finalTitle} 저장 완료 (${words.length}개)`:`✅ Page ${finalTitle} saved (${words.length})`);
  stack = [{ name:'library' }, { name:'book', bookId:bId }, { name:'page-words', bookId:bId, pageNum:finalTitle }];
  render();
}

function buildScanPrompt(useExclude=true) {
  const target = getTargetLang(), native = getNativeLang();
  const exclude = useExclude ? buildExcludePrompt() : '';
  const isEnglish = (target.code === 'en' || target.name === 'English' || target.name === '영어');
  const levelGuide = isEnglish
    ? `CEFR 난이도 기준으로 각 단어를 반드시 분류하세요:\n- C2: 원어민 수준\n- C1: 대학/원서 수준 고급 어휘 (가장 먼저 찾기)\n- B2: 고급 중급\n- B1: 중급\n- A2: 초급\nC1~C2 단어를 먼저 찾고, B2, B1 순서로 채워주세요.`
    : `각 단어의 난이도를 5단계로 분류하세요. 사용 빈도가 낮고 어려울수록 높은 등급입니다:\n- C2: 매우 어려움 (전문·희귀 어휘)\n- C1: 어려움 (고급 어휘, 가장 먼저 찾기)\n- B2: 중상급\n- B1: 중급\n- A2: 초급 (기초 어휘)\n어려운 단어(C1~C2)를 먼저 찾고, B2, B1 순서로 채워주세요.`;
  return `이 ${target.name} 책 페이지에서 어려운 ${target.name} 단어를 우선으로 최대 20개 추출해주세요.\n${levelGuide}${exclude}\n\n또한 이 사진에서 페이지 번호가 보이면 읽어서 page 필드에 넣어주세요. 페이지 번호가 안 보이면 page는 빈 문자열("")로 두세요. 페이지 번호는 보통 페이지 위쪽이나 아래쪽 모서리에 있는 숫자나 로마숫자입니다. 연도, 각주 번호, 본문 속 숫자는 페이지 번호가 아닙니다.\n\n중요: "en" 필드에는 ${target.name} 단어를 넣고, "base"와 "ctx" 필드에는 ${native.name}로 된 뜻을 넣어주세요. "en"이라는 이름이지만 실제로는 ${target.name} 단어가 들어갑니다. 또한 각 단어를 사용한 짧고 자연스러운 ${target.name} 예문 한 문장을 "sentence" 필드에 넣어주세요.\n\n반드시 JSON만 반환 (level 필드는 C2/C1/B2/B1/A2 중 하나):\n{"page":"34","words":[{"en":"${target.name} 단어","base":"${native.name} 뜻","ctx":"${native.name} 문맥 뜻","sentence":"그 단어를 사용한 짧은 ${target.name} 예문","level":"C1"}]}`;
}

// ── 이미 등록된 단어 목록 추출 ──
function getExistingWordList() {
  const words = [];
  books.forEach(book => {
    book.pages.forEach(page => {
      page.words.forEach(w => {
        if (w.en) words.push(w.en.toLowerCase().trim());
      });
    });
  });
  // 중복 제거
  return [...new Set(words)];
}

function buildExcludePrompt() {
  const existing = getExistingWordList();
  if (!existing.length) return '';
  // 최근 100개만 (너무 많으면 Gemini 응답 품질 저하)
  const limited = existing.slice(-100);
  return `\n\n가능하면 이미 등록된 단어는 피해주세요 (필수는 아님):\n${limited.join(', ')}`;
}

async function doScan() {
  // 스캔 제한 체크
  if (!canScan()) { handleScanBlocked(); return; }
  const bId = document.getElementById('up-book-sel')?.value;
  if (!bId) { toast('책을 먼저 선택해주세요'); return; }
  let pg;
  if (window._captureMode === 'add') {
    if (!window._addTargetPage) { toast('추가할 페이지를 선택해주세요'); return; }
    pg = window._addTargetPage;
    const newName = document.getElementById('rename-pg-inp')?.value.trim();
    if (newName) window._renamedPageNum = newName; else window._renamedPageNum = null;
  } else {
    pg = document.getElementById('up-pg-inp')?.value.trim();
    if (!pg) { toast('페이지 번호를 입력해주세요'); return; }
  updateTotalWords();
  window._renamedPageNum = null;
}
  if (!imgData) { toast('사진을 먼저 선택해주세요'); return; }
  renderScanLoading();
  let words;
  try {
    const b64 = imgData.split(',')[1], mt = imgData.split(';')[0].split(':')[1];
    const data = await geminiWithRetry({ contents:[{parts:[{inline_data:{mime_type:mt,data:b64}},{text:buildScanPrompt(true)}]}], generationConfig:{temperature:0.1,maxOutputTokens:8192} });
    if (data.error) {
      if (data.error.code===403) toast('API 키를 확인해주세요');
      else toast('오류가 발생했어요\n잠시 후 다시 시도해주세요');
      render(); return;
    }
    if (!data.candidates?.[0]) { toast('응답 오류, 다시 시도해주세요'); render(); return; }
    const txt = data.candidates[0].content.parts[0].text;
    words = parseWordsRobust(txt);
    if (!words?.length) { toast('단어를 찾지 못했어요'); render(); return; }
  } catch(e) { toast('네트워크 오류\n잠시 후 다시 시도해주세요'); render(); return; }
  await incrementScanCount();
  pendingW = words; pendingB = bId; pendingP = pg;
  renderWordSelection(words);
}

async function acceptWords() {
  const book = findBook(pendingB); if (!book) return;
  const pid = await savePageWordsToDB(pendingB, pendingP, pendingW);
  const words = pendingW.map((w,i) => ({...w, id:`${pendingB}-${pendingP}-${i+1}`}));
  const ex = findPage(book, pendingP);
  const newName = window._renamedPageNum;
  if (ex) {
    ex.words = [...ex.words, ...words];
    if (newName && newName !== pendingP) {
      try {
        await fetch(SB_URL + `/rest/v1/voca_pages?id=eq.${ex._pid}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + _authToken }, body: JSON.stringify({ page_num: newName }) });
        ex.num = newName; toast(userNativeLang==='ko'?`Page ${newName} 단어 추가 완료`:`Page ${newName} words added`);
        replace({ name:'page-words', bookId:pendingB, pageNum:newName });
      } catch(e) { toast(userNativeLang==='ko'?`Page ${pendingP} 단어 추가 완료`:`Page ${pendingP} words added`); replace({ name:'page-words', bookId:pendingB, pageNum:pendingP }); }
    } else { toast(userNativeLang==='ko'?`Page ${pendingP} 단어 추가 완료`:`Page ${pendingP} words added`); replace({ name:'page-words', bookId:pendingB, pageNum:pendingP }); }
  } else {
    book.pages.push({num:pendingP, _pid:pid, words});
    book.pages.sort((a,b)=>pageSort(a,b));
    toast(userNativeLang==='ko'?`Page ${pendingP} 저장 완료`:`Page ${pendingP} saved`);
    replace({ name:'page-words', bookId:pendingB, pageNum:pendingP });
  }
  window._renamedPageNum = null;
}

async function toggleFavorite(bookId, pageNum, wordIdx) {
  const book = findBook(bookId);
  const page = book ? findPage(book, pageNum) : null;
  const word = page?.words[wordIdx];
  if (!word) return;
  if (!word.id) { toast(userNativeLang==='ko'?'새로고침 후 즐겨찾기를 쓸 수 있어요':'Reload to favorite this word'); return; }
  const next = !word.fav;
  word.fav = next;
  render();
  const url = `/rest/v1/voca_words?id=eq.${word.id}`;
  const send = async () => {
    const opt = { method:'PATCH', headers:{ 'Content-Type':'application/json', 'apikey':SB_KEY, 'Authorization':'Bearer '+_authToken }, body: JSON.stringify({ is_favorite: next }) };
    let res = await fetch(SB_URL + url, opt);
    if ((res.status===401||res.status===403) && await refreshSession()) { opt.headers.Authorization = 'Bearer '+_authToken; res = await fetch(SB_URL + url, opt); }
    return res;
  };
  try {
    const res = await send();
    if (!res.ok) throw new Error('fav write failed ' + res.status);
  } catch(e) { word.fav = !next; render(); toast(userNativeLang==='ko'?'잠시 후 다시 시도해주세요':'Please try again'); }
}

// 예문 일괄 채우기 (묶음 호출, 1회성) - 책 메뉴에서 실행
async function backfillSentences(bookId) {
  if (!apiKey) { toast(userNativeLang==='ko'?'먼저 AI(API) 키 설정이 필요해요':'API key required first'); return; }
  const book = findBook(bookId); if (!book) return;
  const targets = [];
  book.pages.forEach(p => p.words.forEach(w => { if (w.id && !w.sentence) targets.push(w); }));
  if (!targets.length) { toast(userNativeLang==='ko'?'이미 모든 단어에 예문이 있어요':'All words already have examples'); return; }
  if (!confirm(userNativeLang==='ko'?`예문 없는 단어 ${targets.length}개에 AI로 예문을 채울까요?`:`Generate examples for ${targets.length} words?`)) return;
  const target = getTargetLang();
  const BATCH = 20; let done = 0;
  for (let i=0; i<targets.length; i+=BATCH) {
    const chunk = targets.slice(i, i+BATCH);
    toast(userNativeLang==='ko'?`예문 생성 중... (${done}/${targets.length})`:`Generating... (${done}/${targets.length})`);
    const wordList = chunk.map(w => w.en).join(', ');
    const prompt = `다음 ${target.name} 단어 각각에 대해 그 단어를 사용한 짧고 자연스러운 ${target.name} 예문을 하나씩 만들어주세요. 단어: ${wordList}\n\n반드시 JSON만 반환: {"sentences":{"단어":"예문"}}`;
    let map = {};
    try {
      const data = await geminiWithRetry({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.3,maxOutputTokens:4096} });
      const txt = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
      const clean = txt.replace(/```json|```/g,'').trim();
      try { map = JSON.parse(clean).sentences || {}; }
      catch(e2) { const re=/"([^"]+)"\s*:\s*"([^"]+)"/g; let m; while((m=re.exec(clean))!==null){ if(m[1]!=='sentences') map[m[1]]=m[2]; } }
    } catch(e) { toast(userNativeLang==='ko'?'생성 실패, 잠시 후 다시 시도':'Failed, try later'); render(); return; }
    for (const w of chunk) {
      const key = Object.keys(map).find(k => k.toLowerCase() === w.en.toLowerCase());
      const sent = key ? map[key] : '';
      if (sent) { w.sentence = sent; try { await sbFetch(`/rest/v1/voca_words?id=eq.${w.id}`, 'PATCH', { sentence: sent }); } catch(e){} }
      done++;
    }
  }
  render();
  toast(userNativeLang==='ko'?`✅ 예문 ${done}개 채웠어요!`:`✅ Filled ${done} examples!`);
}

          <div id="mode-new-area" style="margin-top:14px;">
            <div class="label-xs">${t('pageNumLabel')}</div>

          </div>
          <div id="mode-add-area" style="display:none;margin-top:14px;">
            <div class="label-xs">${t('selectPageLabel')}</div>
            <div style="margin-top:8px;display:flex;flex-direction:column;gap:8px;" id="existing-page-list">
              ${existingPages.length === 0
                ? `<div style="font-size:13px;color:var(--ink-40);padding:12px 0;">${t('noSavedPage')}</div>`
                : existingPages.map(p => `
                  <div onclick="selectExistingPage('${p.num}')" id="ep-${p.num.replace(/[^a-zA-Z0-9]/g,'_')}" style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:10px;border:2px solid var(--ink-12);background:var(--bg-card);cursor:pointer;">
                    <div>
                      <div style="font-size:13px;font-weight:600;color:var(--ink-100);">Page ${p.num}</div>
                      <div style="font-size:11px;color:var(--ink-60);margin-top:2px;">${p.words.length}${t('wordsUnit')}</div>
                    </div>
                    <div id="ep-check-${p.num.replace(/[^a-zA-Z0-9]/g,'_')}" style="display:none;color:var(--accent);font-size:18px;">✓</div>
                  </div>`).join('')
              }
            </div>
            <div id="rename-area" style="display:none;margin-top:14px;">
              <div class="label-xs">${t('renameLabel')} <span style="color:var(--ink-40);font-weight:400;">${t('renameOpt')}</span></div>
              <input type="text" id="rename-pg-inp" placeholder="${t('renamePh')}" style="width:100%;background:var(--bg-input);border:1px solid rgba(0,0,0,0.07);border-radius:10px;padding:11px 14px;font-family:var(--font-body);font-size:13px;color:var(--ink-100);outline:none;margin-top:6px">
              <div style="font-size:11px;color:var(--ink-40);margin-top:4px;">${t('renameHint')}</div>
            </div>
          </div>
          <div id="upload-main" style="margin-top:14px;">
            <div style="display:flex;gap:8px;margin-bottom:10px;">
              <button onclick="document.getElementById('file-input').click()" style="flex:1;padding:12px;background:var(--bg-input);border:1.5px dashed var(--ink-12);border-radius:12px;font-family:var(--font-body);font-size:13px;cursor:pointer;color:var(--ink-60);display:flex;align-items:center;justify-content:center;gap:6px;">
                ${/iphone|ipad|ipod|android/i.test(navigator.userAgent) ? (userNativeLang==='ko'?'📷 촬영 / 사진 선택':'📷 Camera / Photos') : t('fileSelect')}
              </button>
              ${/iphone|ipad|ipod|android/i.test(navigator.userAgent) ? '' : `<button onclick="openCamera()" style="flex:1;padding:12px;background:var(--bg-input);border:1.5px dashed var(--ink-12);border-radius:12px;font-family:var(--font-body);font-size:13px;cursor:pointer;color:var(--ink-60);display:flex;align-items:center;justify-content:center;gap:6px;">${t('cameraCapture')}</button>`}
            </div>
            <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.webp,.gif,.heic,.heif" multiple style="display:none" onchange="handleFileChange(event)">
            <div id="camera-area" style="display:none;margin-top:8px;">
              <div style="position:relative;">
                <video id="camera-video" autoplay playsinline style="width:100%;border-radius:10px;max-height:220px;object-fit:cover;background:#000;display:block;"></video>
                <!-- 플래시 효과 -->
                <div id="camera-flash" style="position:absolute;inset:0;background:#fff;border-radius:10px;opacity:0;pointer-events:none;transition:opacity 0.15s;"></div>
                <!-- 촬영 수 뱃지 -->
                <div id="camera-counter" style="display:none;position:absolute;top:8px;right:8px;background:var(--accent);color:#fff;border-radius:99px;font-size:11px;font-weight:700;padding:3px 10px;"></div>
              </div>
              <!-- 촬영된 썸네일 -->
              <div id="camera-thumbs" style="display:none;flex-direction:row;gap:8px;margin-top:8px;flex-wrap:wrap;"></div>
              <!-- 버튼 -->
              <div style="display:flex;gap:8px;margin-top:8px;">
                <button id="camera-capture-btn" onclick="capturePhoto()" style="flex:1;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:var(--font-body);font-size:13px;cursor:pointer;font-weight:600;">${userNativeLang==='ko'?'📸 촬영하기':'📸 Capture'}</button>
                <button onclick="cancelCamera()" style="padding:12px 16px;background:var(--bg-input);border:none;border-radius:10px;font-family:var(--font-body);font-size:13px;cursor:pointer;color:var(--ink-60);">${t('cancelBtn')}</button>
              </div>
              <button id="camera-use-btn" onclick="useCameraShots()" style="display:none;width:100%;margin-top:8px;padding:12px;background:#27ae60;color:#fff;border:none;border-radius:10px;font-family:var(--font-body);font-size:13px;cursor:pointer;font-weight:600;"></button>
              <div style="font-size:10px;color:var(--ink-40);margin-top:6px;text-align:center;">${t('maxShots')}</div>

            <div style="font-size:10px;color:var(--ink-40);margin-top:8px;text-align:center;">${t('fileTypes')}</div>
            <div style="font-size:10px;color:#e67e22;margin-top:3px;text-align:center;">${t('iphoneHint')}</div>
          </div>
        </div>
      </div>`;
  }

  else if (route.name === 'page-words') {
    const book = findBook(route.bookId);
    const page = book ? findPage(book, route.pageNum) : null;
    if (!page) { back(); return; }
    root.innerHTML = `
      <div class="scr" style="padding-bottom:110px">
        <div class="topnav"><span class="topnav__back" onclick="back()">←</span><span class="topnav__title">${book.title} · Page ${page.num}</span><span></span></div>
        <div class="h-display h-xl" style="margin-top:14px">${page.words.length} words</div>
        <div class="muted" style="font-size:11px;margin-top:4px">${userNativeLang==='ko'?'기본 뜻 + 문맥 뜻':'Meaning + Context'}</div>
        <div class="scr-scroll" style="margin-top:12px">
          ${page.words.map((w,wi)=>{const lc={'C2':'#7b2d8b','C1':'#c0392b','B2':'#e67e22','B1':'#2980b9','A2':'#27ae60','A1':'#95a5a6'};const lv=w.level||'';return `<div class="word-item"><div style="display:flex;align-items:center;gap:8px;"><div class="word-item__en">${w.en}</div>${lv?`<span style="font-size:10px;font-weight:700;color:#fff;background:${lc[lv]||'#999'};border-radius:99px;padding:2px 7px;">CEFR ${lv}</span>`:''}<button onclick="speak('${w.en}')" style="background:none;border:none;cursor:pointer;font-size:16px;padding:0;">🔊</button><button onclick="toggleFavorite('${book.id}','${page.num}',${wi})" style="background:none;border:none;cursor:pointer;font-size:15px;padding:0;margin-left:auto;color:${w.fav?'#f39c12':'var(--ink-40)'};" title="${userNativeLang==='ko'?'즐겨찾기':'Favorite'}">${w.fav?'⭐':'☆'}</button><button onclick="deletePageWord('${book.id}','${page.num}',${wi})" style="background:none;border:none;cursor:pointer;font-size:14px;padding:0;color:var(--ink-40);" title="${userNativeLang==='ko'?'단어 삭제':'Delete word'}">🗑️</button></div><div class="word-item__base">${w.base}</div><div class="word-item__ctx">↳ <em>${w.ctx}</em></div>${w.sentence?`<div class="word-item__ctx" style="color:var(--ink-60);margin-top:3px;">📝 ${w.sentence}</div>`:''}</div>`;}).join('')}
        </div>
        <div class="btn-fixed" style="flex-direction:row;gap:8px;">
          <button class="btn btn-solid" style="flex:1;" onclick="initStudy('${book.id}','page','${page.num}');push({name:'study-cards',bookId:'${book.id}',pageNum:'${page.num}',scope:'page'})">${userNativeLang==='ko'?'📚 암기 카드':'📚 Study'}</button>
          <button class="btn btn-outline" style="flex:1;" onclick="push({name:'manual-add',bookId:'${book.id}',pageNum:'${page.num}'})">${userNativeLang==='ko'?'✏️ 직접 입력':'✏️ Add'}</button>
        </div>
      </div>`;
  }

  else if (route.name === 'stats') { renderStats(root, dock); return; }
  else if (route.name === 'search') { renderSearch(root, dock); return; }
  else if (route.name === 'review') { renderReviewPage(root, dock); return; }
  else if (route.name === 'manual-add') { renderManualAdd(root, route); return; }

  else if (route.name === 'study-setup') {
    window._ss = { bookId: books[0]?.id || null, scope: 'all', page: null };
    window.ssSelectBook = id => { window._ss.bookId=id; window._ss.page=null; ssRender(); };
    window.ssSelectScope = s => { window._ss.scope=s; window._ss.page=null; ssRender(); };
    window.ssSelectPage = n => { window._ss.page=n; ssRender(); };
    window.ssStart = () => { const s=window._ss; initStudy(s.bookId,s.scope,s.page); push({name:'study-cards',bookId:s.bookId,scope:s.scope,pageNum:s.page}); };
    window.ssRender = () => {
      const s=window._ss, book=s.bookId?findBook(s.bookId):null;
      const total=book?(s.scope==='all'?countWords(book):(s.page?findPage(book,s.page)?.words.length||0:0)):0;
      const canStart=!!book&&total>0&&(s.scope==='all'||s.page!=null);
      const el=document.getElementById('study-setup-inner'); if(!el)return;
      el.innerHTML=`
        ${(()=>{ const favN=allFavoriteWords().length; return favN>0?`<div class="scope-card" style="border-color:#f39c12;margin-top:16px;"><div class="scope-card__head"><div><div class="scope-card__name">⭐ ${userNativeLang==='ko'?'즐겨찾기 모아 외우기':'Study favorites'}</div><div class="scope-card__hint">${userNativeLang==='ko'?`별 단 단어 ${favN}개 · 모든 책 통합`:`${favN} starred · all books`}</div></div></div><div style="display:flex;gap:8px;margin-top:12px;"><button class="btn btn-solid" style="flex:1;padding:11px;font-size:13px;" onclick="initStudy('__fav__','favorite');push({name:'study-cards',bookId:'__fav__',scope:'favorite'})">${t('flashCard')}</button><button class="btn btn-outline" style="flex:1;padding:11px;font-size:13px;" onclick="startQuiz('__fav__','favorite')">${t('quizModeBtn')}</button></div></div>`:''; })()}
        <div class="label-xs" style="margin-top:20px">${t('bookLabel')}</div>
        <div style="margin-top:6px">
          ${books.map(b=>`<div class="list-row" onclick="ssSelectBook('${b.id}')"><div style="width:38px;height:52px;border-radius:5px;background:${b.color};flex-shrink:0"></div><div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--ink-100);">${b.title}</div><div style="font-size:11px;color:var(--ink-60);margin-top:2px">${b.author} · ${countWords(b)} words</div></div><div class="radio ${s.bookId===b.id?'radio--on':''}">${s.bookId===b.id?'✓':''}</div></div>`).join('')}
        </div>
        ${book?`<div class="label-xs" style="margin-top:16px">${t('scopeLabel')}</div><div style="margin-top:8px;display:flex;flex-direction:column;gap:10px">
          <div class="scope-card ${s.scope==='all'?'scope-card--on':''}" onclick="ssSelectScope('all')"><div class="scope-card__head"><div><div class="scope-card__name">${t('scopeAll')}</div><div class="scope-card__hint">${countWords(book)} words · 무작위로 섞기</div></div><div class="radio ${s.scope==='all'?'radio--on':''}">${s.scope==='all'?'✓':''}</div></div></div>
          <div class="scope-card ${s.scope==='page'?'scope-card--on':''}" onclick="ssSelectScope('page')"><div class="scope-card__head"><div><div class="scope-card__name">${t('scopePage')}</div><div class="scope-card__hint">${userNativeLang==='ko'?'한 페이지씩 끊어서':'One page at a time'}</div></div><div class="radio ${s.scope==='page'?'radio--on':''}">${s.scope==='page'?'✓':''}</div></div>${s.scope==='page'?`<div class="chip-wrap" style="margin-top:12px">${book.pages.map(p=>`<span class="chip" style="${String(s.page)===String(p.num)?'background:var(--ink-100);color:var(--bg-page);border-color:var(--ink-100)':''}" onclick="event.stopPropagation();window._ss.page='${p.num}';ssRender()">Page ${p.num} · ${p.words.length}</span>`).join('')}</div>`:''}</div>
        </div>`:''}
        <div style="height:22px"></div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <button class="btn ${canStart?'btn-solid':'btn-outline'}" style="opacity:${canStart?1:0.4};cursor:${canStart?'pointer':'default'}" onclick="${canStart?'ssStart()':''}">${t('flashCard')}${canStart?` — ${total}개`:''}</button>
          <button class="btn btn-outline" style="opacity:${canStart?1:0.4};cursor:${canStart?'pointer':'default'}" onclick="${canStart?`startQuiz('${s.bookId}','${s.scope}','${s.page}')`:''}" >${t('quizModeBtn')}${canStart?` — ${total}개`:''}</button>
        </div>`;
    };
    root.innerHTML = `<div class="scr" style="padding-bottom:90px;padding-top:50px;"><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><img src="https://imvoca.app/2.png" style="width:36px;height:36px;object-fit:contain;"><div style="font-family:var(--font-body);font-weight:500;letter-spacing:-0.02em;font-size:24px;color:var(--ink-100);">${userNativeLang==='ko'?'암기 카드':'Flashcards'}</div></div><div class="muted" style="font-size:12px;margin-top:2px;">${t('whichBook')}</div><div class="scr-scroll" id="study-setup-inner"></div></div>` + dock;
    ssRender();
  }

  else if (route.name === 'study-cards') {
    if (!studyState || studyState.bookId !== route.bookId) { initStudy(route.bookId, route.scope, route.pageNum); }
    renderStudyCard(); return;
  }

  else if (route.name === 'quiz') {
    if (!window._quiz || window._quiz.bookId !== route.bookId) { startQuiz(route.bookId, route.scope, route.pageNum); }
    renderQuiz(); return;
  }

  else if (route.name === 'study-done') {
    const book = findBook(route.bookId);
    root.innerHTML = `
      <div class="scr">
        <div class="topnav"><span></span><span class="topnav__title">${book?.title||''}</span><span class="topnav__right" onclick="goTab('books')">✕</span></div>
        <div class="done">
          ${(window._lastEarnedScore>0)?(
            window._lastReviewFinished ? `
          <div class="celebrate-card celebrate-card--master">
            <div class="celebrate-coin">🏆</div>
            <div class="celebrate-title" style="color:#b8860b;">${userNativeLang==='ko'?'완벽하게 마스터했어요! 🎉':'Fully Mastered! 🎉'}</div>
            <div class="celebrate-score" style="color:#d4af37;">+${window._lastEarnedScore}<span style="font-size:20px;font-weight:600;">${userNativeLang==='ko'?'점':'pts'}</span></div>
            <div class="celebrate-bonus">${userNativeLang==='ko'?`🔥 완주 보너스 2배! (${window._lastBaseScore} × 2)`:`🔥 Completion bonus ×2! (${window._lastBaseScore} × 2)`}</div>
            <div class="celebrate-sub" style="margin-top:6px;">${userNativeLang==='ko'?'모든 복습 단계를 끝까지 완주했어요!':'You completed every review stage!'}</div>
          </div>` : `
          <div class="celebrate-card">
            <div class="celebrate-coin">🪙</div>
            <div class="celebrate-title">${userNativeLang==='ko'?'축하합니다! 🎉':'Congratulations! 🎉'}</div>
            <div class="celebrate-score">+${window._lastEarnedScore}<span style="font-size:20px;font-weight:600;">${userNativeLang==='ko'?'점':'pts'}</span></div>
            <div class="celebrate-sub">${userNativeLang==='ko'?'복습 점수를 획득했어요':'Review points earned'}</div>
            <div class="celebrate-hint">${userNativeLang==='ko'?'🔥 마지막 단계까지 완주하면 점수 2배!':'🔥 Finish all stages for double points!'}</div>
          </div>`
          ):''}
          <div class="label-xs">${t('memoryDone')}</div>
          <div class="done__n">${route.total}</div>
          <div class="done__label">${t('wordsMemorized')}</div>
          ${route.scope==='page'?`<div style="margin-top:12px;background:var(--gold-bg);border-radius:12px;padding:10px 14px;text-align:left;width:100%;">
            <div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:4px;">${t('reviewRegistered')}</div>
            <div style="font-size:11px;color:var(--ink-60);line-height:1.6;">${t('reviewSchedule')}<br>${t('reviewScheduleDesc')}</div>
          </div>`:''}
          <div class="done__grid">
            <div class="done__tile"><div class="done__tile-label">Rounds</div><div class="done__tile-value">${route.rounds}</div></div>
            <div class="done__tile"><div class="done__tile-label">Scope</div><div class="done__tile-value" style="font-size:16px;">${route.scope==='page'?`Page ${route.pageNum}`:'All'}</div></div>
          </div>
          <div style="width:100%;margin-top:20px;display:flex;flex-direction:column;gap:10px">
            <button class="btn btn-solid" onclick="initStudy('${route.bookId}','${route.scope}','${route.pageNum}');push({name:'study-cards',bookId:'${route.bookId}',scope:'${route.scope}',pageNum:'${route.pageNum}'})">${t('studyAgain')}</button>
            <button class="btn btn-outline" onclick="startQuiz('${route.bookId}','${route.scope}','${route.pageNum}')">${t('quizMode')}</button>
            ${route.isReview ?
              `<button class="btn btn-solid" style="background:#27ae60;" onclick="goTab('review')">${userNativeLang==='ko'?'📆 복습 목록으로 돌아가기':'📆 Back to Review'}</button>` :
              `<button class="btn btn-outline" onclick="goTab('books')">${t('toBookshelf')}</button>`}
          </div>
        </div>
      </div>`;
  }
}

function renderStudyCard() {
  const root=document.getElementById('root'), s=studyState, route=stack[stack.length-1];
  if (!s||s.queue.length===0) { replace({name:'study-done',bookId:route.bookId,scope:route.scope,pageNum:route.pageNum,rounds:s.round,total:s.stats.total}); return; }
  const w=s.queue[s.idx], prog=s.idx/s.queue.length*100;
  root.innerHTML=`<div class="study"><div class="study__top"><span class="study__info">${s.idx+1} / ${s.queue.length}</span><span class="study__info">${s.scope==='favorite'?'⭐ '+(userNativeLang==='ko'?'즐겨찾기':'Favorites'):(findBook(s.bookId)?.title||'')}</span><span class="study__close" onclick="back();studyState=null">✕</span></div><div class="study__bar"><div class="study__fill" style="width:${Math.round(prog)}%"></div></div><div class="study__round">Round ${s.round} · ${s.xList.length} ✕ so far</div><div class="card-wrap" onclick="flipCard()"><div class="card ${s.flipped?'card--flip':''}"><div class="face face-front"><div class="face-front__center"><div class="card__word" style="font-size:${w.en.length>20?20:w.en.length>16?24:w.en.length>13?30:w.en.length>10?36:44}px;">${w.en}</div><div class="card__ipa">${w.ipa||''}</div><button onclick="event.stopPropagation();speak('${w.en}')" style="background:var(--gold-bg);border:1px solid var(--ink-12);border-radius:99px;padding:6px 16px;font-size:12px;cursor:pointer;font-family:var(--font-body);color:var(--accent);margin-top:8px;">${t('pronounce')}</button></div><div class="card__tap">${t('cardFront')}</div></div><div class="face face-back"><div class="back__word" style="font-size:${w.en.length>20?14:w.en.length>16?17:w.en.length>13?20:w.en.length>10?23:27}px;">${w.en}</div><div class="back__label">${t('cardMeaning')}</div><div class="back__meaning">${w.base}</div><div class="back__label">${t('cardContext')}</div><div class="back__meaning">${w.ctx}</div>${w.sentence?`<div class="back__label">${userNativeLang==='ko'?'예문':'Example'}</div><div class="back__meaning" style="font-size:14px;">${w.sentence}</div>`:''}</div></div></div><div class="ox-row"><button class="ox-btn ox-x" onclick="advance(false)">✕</button><button class="ox-btn ox-o" onclick="advance(true)">○</button></div><div class="ox-hint">${s.flipped?(userNativeLang==='ko'?'○ 외움 · ✕ 다음 사이클  |  Space = 앞면':'○ Got it · ✕ Next cycle  |  Space = Front'):(userNativeLang==='ko'?'탭해서 뜻 보기  |  ○✕ 바로 선택 가능':'Tap to see meaning  |  ○✕ to choose')}</div></div>`;
}

function flipCard() {
  if (!studyState.flipped) { studyState.flipped=true; renderStudyCard(); }
  else { studyState.flipped=false; renderStudyCard(); }
}

document.addEventListener('keydown', function(e) {
  if (!studyState) return;
  const route = stack[stack.length-1];
  if (route.name !== 'study-cards') return;
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  else if (e.code === 'ArrowRight' || e.code === 'KeyO') { advance(true); }
  else if (e.code === 'ArrowLeft' || e.code === 'KeyX') { advance(false); }
});

async function advance(isKnown) {
  const s=studyState; s.stats.seen++; if(isKnown)s.stats.oCount++;
  const newX=isKnown?s.xList:[...s.xList,s.queue[s.idx]];
  if (s.idx+1<s.queue.length) { s.idx++; s.xList=newX; s.flipped=false; renderStudyCard(); }
  else if (newX.length===0) {
    saveStats(s.bookId, s.stats.total, s.stats.oCount);
    if (s.scope === 'page' && s.pageNum) {
      if (s._reviewId && s._reviewStepKey) {
        // 복습 모드 - 다음 단계로 업데이트
        await updateReviewStep({ id: s._reviewId, _stepKey: s._reviewStepKey, _scheduledDate: s._scheduledDate, book_id: s.bookId, page_num: s.pageNum });
        toast('✅ 복습 완료! 다음 단계로 넘어갔어요');
        await checkReviews();
      } else {
        // 일반 학습 - 복습 일정 새로 등록 (첫날 암기 점수 포함)
        await saveReviewSchedule(s.bookId, s.pageNum);
      }
    }
    replace({name:'study-done',bookId:s.bookId,scope:s.scope,pageNum:s.pageNum,rounds:s.round,total:s.stats.total,isReview:!!(s._reviewId)});
  }
  else { s.round++; s.queue=shuffle(newX); s.idx=0; s.xList=[]; s.flipped=false; renderStudyCard(); }
}

function speak(word) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  // 학습 언어에 맞는 발음 언어 코드
  const ttsMap = { en:'en-US', ko:'ko-KR', es:'es-ES', zh:'zh-CN', ja:'ja-JP', fr:'fr-FR', de:'de-DE', pt:'pt-BR', vi:'vi-VN', id:'id-ID' };
  const tcode = (typeof getTargetLang === 'function' && getTargetLang()?.code) || 'en';
  const ttsLang = ttsMap[tcode] || 'en-US';
  u.lang = ttsLang; u.rate = 0.85; u.pitch = 1;
  const voices = window.speechSynthesis.getVoices();
  // 해당 언어 음성 우선, 없으면 영어
  const langPrefix = ttsLang.split('-')[0];
  const preferred = voices.find(v => v.lang === ttsLang && v.localService)
    || voices.find(v => v.lang === ttsLang)
    || voices.find(v => v.lang && v.lang.startsWith(langPrefix));
  if (preferred) u.voice = preferred;
  window.speechSynthesis.speak(u);
}

async function saveReviewSchedule(bookId, pageNum) {
  try {
    const check = await fetch(SB_URL + `/rest/v1/voca_review?user_id=eq.${currentUser.id}&book_id=eq.${bookId}&page_num=eq.${pageNum}&select=id,completed`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + _authToken } });
    const existing = await check.json();
    if (existing?.length > 0) {
      // 복습 일정이 있는데 책장에서 암기한 경우 안내
      const hasdue = existing.some(r => !r.completed);
      if (hasdue) {
        setTimeout(() => {
          toast(userNativeLang==='ko'?'📆 복습 일정이 있어요! 복습 탭에서 완료해주세요':'📆 You have a review scheduled! Complete it in the Review tab');
        }, 1500);
      }
      return;
    }
    const now = new Date();
    // 날짜만 비교하기 위해 자정(00:00:00) 기준으로 저장
    const toMidnight = (d, n) => {
      const date = new Date(d);
      date.setDate(date.getDate() + n);
      date.setHours(0, 0, 0, 0);
      return date.toISOString();
    };
    const addDays = (d, n) => toMidnight(d, n);
    const res = await fetch(SB_URL + '/rest/v1/voca_review', {

function answerQuiz(chosen, correct) {
  const q = window._quiz;
  const isCorrect = chosen === correct;
  if (isCorrect) { q.correct++; if(!q._correct)q._correct=[]; q._correct.push(q.idx); }
  const btns = document.querySelectorAll('.scr button[onclick^="answerQuiz"]');
  btns.forEach(btn => {
    btn.disabled = true;
    const txt = btn.textContent.trim().substring(3);
    const word = q.words.find(w => w.base === txt);
    if (word?.en === correct) btn.style.background = '#eafaf1';
    else if (word?.en === chosen && !isCorrect) btn.style.background = '#fdeaea';
  });
  setTimeout(() => { q.idx++; renderQuiz(); }, 800);
}

async function checkReviews() {
  try {
    // 오늘 날짜 끝(23:59:59)까지를 today로 설정 → 오늘 복습 대상 모두 포함
    const todayEnd = new Date();
    todayEnd.setHours(23, 59, 59, 999);
    const today = todayEnd.toISOString();
    const res = await fetch(SB_URL + `/rest/v1/voca_review?user_id=eq.${currentUser.id}&completed=eq.false&select=*`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + _authToken } });
    const reviews = await res.json();
    if (!Array.isArray(reviews)) return;
    const due = [];
    reviews.forEach(r => {
      // 책이 삭제됐으면 복습 알림에서 제외
      if (!findBook(r.book_id)) return;
      const steps = [
        { key: 'review_2d',  label: t('step1'),  date: r.review_2d  },
        { key: 'review_3d',  label: t('step2'),  date: r.review_3d  },
        { key: 'review_6d',  label: t('step3'),  date: r.review_6d  },
        { key: 'review_15d', label: t('step6'),  date: r.review_15d },
        { key: 'review_30d', label: t('step15'), date: r.review_30d },
        { key: 'review_60d', label: t('step30'), date: r.review_60d },
      ];
      const oldest = steps.find(s => s.date && s.date <= today);
      if (oldest) due.push({ ...r, _stepKey: oldest.key, _stepLabel: oldest.label });
    });
    if (!due.length) return;
    let totalWords = 0;
    due.forEach(r => { const book = findBook(r.book_id); const page = book ? findPage(book, r.page_num) : null; if (page) totalWords += page.words.length; });
    window._dueReviews = due;
    const stepCounts = {};
    due.forEach(r => { stepCounts[r._stepLabel] = (stepCounts[r._stepLabel]||0) + 1; });
    const stepText = Object.entries(stepCounts).map(([k,v]) => `${k} ${v}${userNativeLang==='ko'?'개':''}`).join(' · ');

    // 뱃지 업데이트
    window._reviewBadgeCount = due.length;
    const dockEl = document.querySelector('.dock');
    if (dockEl) dockEl.outerHTML = buildDock();
  } catch(e) {}
}

    });
