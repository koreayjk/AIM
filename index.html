async function updateReviewStep(review) {
  try {
    const patch = {};
    const key = review._stepKey;
    const now = new Date();

    // 복습 단계 순서 및 다음 단계까지의 간격 (일)
    const STEPS = [
      { key: 'review_2d',  next: 'review_3d',  days: 1 },
      { key: 'review_3d',  next: 'review_6d',  days: 2 },
      { key: 'review_6d',  next: 'review_15d', days: 5 },
      { key: 'review_15d', next: 'review_30d', days: 9 },
      { key: 'review_30d', next: 'review_60d', days: 15 },
      { key: 'review_60d', next: null,          days: 0 },
    ];

    const step = STEPS.find(s => s.key === key);

    // 현재 단계 null로 지우기 (복습 완료 표시)
    patch[key] = null;

    // 원래 예정일과 오늘 비교 - 하루 이상 미뤄졌으면 is_perfect = false
    const scheduled = review._scheduledDate ? new Date(review._scheduledDate) : null;
    if (scheduled) {
      const diffDays = Math.floor((now - scheduled) / (1000 * 60 * 60 * 24));
      if (diffDays > 0) patch.is_perfect = false;
    }

    if (!step || !step.next) {
      // 마지막 단계 → 완료
      patch.completed = true;
    } else {
      // 다음 단계 날짜를 오늘 기준으로 재계산
      const nextDate = new Date(now);
      nextDate.setDate(nextDate.getDate() + step.days);
      nextDate.setHours(0, 0, 0, 0);
      patch[step.next] = nextDate.toISOString();
    }

    // 복습 단계 하나 완료할 때마다, 그 페이지 단어들의 난이도 점수를 합산해 반영
    const rbook = findBook(review.book_id);
    const rpage = rbook?.pages.find(p => String(p.num) === String(review.page_num));
    const baseScore = rpage ? calcWordScore(rpage.words) : 0;
    const isFinalStep = (!step || !step.next); // 마지막 단계(60일차) 완주
    const pageScore = isFinalStep ? baseScore * 2 : baseScore; // 완주 시 2배 보너스
    window._lastReviewFinished = isFinalStep; // 축하 화면 분기용
    window._lastBaseScore = baseScore; // 기본 점수 (보너스 표시용)
    if (pageScore > 0) { addReviewScore(pageScore); window._lastEarnedScore = pageScore; }
    // 이 책의 복습 상태가 바뀌었으니 캐시 리셋 (다음에 책 열면 새로 불러옴)
    if (review.book_id) { _reviewStatusLoaded[review.book_id] = false; }

    const res = await fetch(SB_URL + `/rest/v1/voca_review?id=eq.${review.id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + _authToken, 'Prefer': 'return=representation' },
      body: JSON.stringify(patch)
    });
    const result = await res.json();
  } catch(e) {
    console.error('[updateReviewStep 오류]', e);
  }
}

            <div style="flex:1;">

            </div>
            <span style="font-size:11px;color:var(--ink-40);flex-shrink:0;margin-left:8px;">${r._nextLabel} ${t('nextLabel')}</span>
          </div>
          <div style="margin-top:10px;">
            <div style="height:4px;background:var(--ink-07);border-radius:99px;overflow:hidden;">
              <div style="height:100%;width:${progress}%;background:var(--accent);border-radius:99px;"></div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:6px;">
              ${STEPS.map(s => `<span style="font-size:9px;color:${!r[s.key]?'#27ae60':'var(--ink-40)'};font-weight:${!r[s.key]?'700':'400'}">${s.label}${!r[s.key]?'✓':''}</span>`).join('')}
            </div>
          </div>
          <div style="margin-top:8px;font-size:11px;color:var(--ink-40);">📅 ${t('nextReview')}: ${new Date(r._nextDate).toLocaleDateString('ko-KR')}</div>
        </div>`;
      }

      // done
      return `<div style="background:rgba(39,174,96,0.07);border:1.5px solid #27ae60;border-radius:14px;padding:14px 16px;margin-bottom:10px;opacity:0.75;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:700;color:var(--ink-100);">${book?.title||t('deletedBook')}</div>
            <div style="font-size:11px;color:var(--ink-60);margin-top:2px;">Page ${r.page_num} · ${wordCount}${t('wordsUnit')} · ${t('studiedDate')} ${studiedDate}</div>

        </div>
        <div style="margin-top:8px;">
          <div style="height:4px;background:var(--ink-07);border-radius:99px;overflow:hidden;">
            <div style="height:100%;width:100%;background:#27ae60;border-radius:99px;"></div>
          </div>
        </div>
      </div>`;
    }

    let html = '';
    if (todayDue.length) {
      html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <div style="font-size:13px;font-weight:700;color:var(--accent);">${t('todayReview')}</div>
        <div style="background:var(--accent);color:#fff;font-size:11px;font-weight:700;border-radius:99px;padding:2px 9px;">${todayDue.length}${userNativeLang==='ko'?'개':''}</div>
        <div style="font-size:11px;color:var(--ink-60);">${t('tapToStart')}</div>
      </div>`;
      html += todayDue.map(r => reviewCard(r, 'due')).join('');
    }
    if (upcoming.length) { html += `<div style="font-size:12px;font-weight:700;color:var(--ink-60);margin-top:16px;margin-bottom:8px;">${t('scheduledTitle')} (${upcoming.length}${userNativeLang==='ko'?'개':''})</div>`; html += upcoming.map(r => reviewCard(r, 'upcoming')).join(''); }
    if (done.length) { html += `<div style="font-size:12px;font-weight:700;color:#27ae60;margin-top:16px;margin-bottom:8px;">${t('completedTitle')} (${done.length}${userNativeLang==='ko'?'개':''})</div>`; html += done.map(r => reviewCard(r, 'done')).join(''); }
    el.innerHTML = html || `<div style="text-align:center;padding:40px;color:var(--ink-40);font-size:13px;">${t('noReviewSchedule')}</div>`;
  } catch(e) { document.getElementById('review-list').innerHTML = `<div style="text-align:center;padding:40px;color:var(--ink-40);">${userNativeLang==='ko'?'오류':'Error'}: ${e.message}</div>`; }
}

async function startSingleReview(bookId, pageNum, reviewId, stepKey, scheduledDate) {
  initStudy(bookId, 'page', pageNum);
  studyState._reviewId = reviewId;
  studyState._reviewStepKey = stepKey;
  studyState._scheduledDate = scheduledDate;
  push({ name: 'study-cards', bookId, scope: 'page', pageNum });
}

        </button>

function renderManualWordList() {
  if (!window._manualWords?.length) {
    return `<div style="text-align:center;padding:20px;font-size:12px;color:var(--ink-40);">${t('noManualWords')}<br>${userNativeLang==='ko'?'영어 단어를 입력하고 추가 버튼을 눌러주세요':'Enter a word and click Add'}</div>`;
  }
  return window._manualWords.map((w, i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg-card);border-radius:10px;margin-bottom:6px;">
      <div style="font-size:16px;">📝</div>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:700;color:var(--ink-100);">${w.en}</div>
        <div style="font-size:11px;color:var(--ink-40);margin-top:2px;">${t('pendingMeaning')}</div>
      </div>
      <button onclick="removeManualWord(${i})" style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--ink-40);padding:4px;">✕</button>
    </div>`).join('');
}

function addManualWord() {
  const enInput = document.getElementById('manual-en');
  const en = enInput?.value.trim();
  if (!en) { toast('영어 단어를 입력해주세요'); return; }
  if (window._manualWords.find(w => w.en.toLowerCase() === en.toLowerCase())) { toast('이미 추가된 단어예요'); enInput.value=''; enInput.focus(); return; }
  window._manualWords.push({ en, base: '', ctx: '', level: 'B1', ipa: '' });
  enInput.value = ''; enInput.focus();
  document.getElementById('manual-word-list').innerHTML = renderManualWordList();
  const saveBtn = document.getElementById('manual-save-btn');
  if (saveBtn) { saveBtn.textContent = `${t('saveWithMeaning')} (${window._manualWords.length}${userNativeLang==='ko'?'개':''})`; saveBtn.style.opacity = '1'; }
}

function removeManualWord(i) {
  window._manualWords.splice(i, 1);
  document.getElementById('manual-word-list').innerHTML = renderManualWordList();
  const saveBtn = document.getElementById('manual-save-btn');
  if (saveBtn) {
    if (window._manualWords.length > 0) { saveBtn.textContent = `${t('saveWithMeaning')} (${window._manualWords.length}${userNativeLang==='ko'?'개':''})`; saveBtn.style.opacity = '1'; }
    else { saveBtn.textContent = t('addWordsFirst'); saveBtn.style.opacity = '0.4'; }
  }
}

async function fetchWordMeaning(word) {
  try {
    // 1단계: Free Dictionary API로 영어 뜻 가져오기
    let engMeaning = '';
    try {
      const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
      if (dictRes.ok) {
        const dictData = await dictRes.json();
        const meanings = dictData[0]?.meanings;
        if (meanings?.length) {
          // 첫 번째 뜻만 가져오기 (짧게)
          engMeaning = meanings[0]?.definitions?.[0]?.definition || '';
          if (engMeaning.length > 200) engMeaning = engMeaning.slice(0, 200);
        }
      }
    } catch(e) {}

    // 번역할 텍스트: 영어 뜻이 있으면 그걸 번역, 없으면 단어 자체를 번역
    const textToTranslate = engMeaning || word;

    // 2단계: MyMemory로 한국어 번역 (무료, API 키 불필요)
    const mmRes = await fetch(
      `https://api.mymemory.translated.net/get?q=${encodeURIComponent(textToTranslate)}&langpair=${userTargetLang}|${userNativeLang}&de=imvoca@gmail.com`
    );
    const mmData = await mmRes.json();

    if (mmData.responseStatus === 200) {
      const translated = mmData.responseData.translatedText;
      return { base: translated || t('noMeaning'), ipa: '' };
    }
    // MyMemory 실패 시 단어 자체를 번역 시도
    if (engMeaning) {
      const fallRes = await fetch(
        `https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=${userTargetLang}|${userNativeLang}&de=imvoca@gmail.com`
      );
      const fallData = await fallRes.json();
      if (fallData.responseStatus === 200) {
        return { base: fallData.responseData.translatedText || t('noMeaning'), ipa: '' };
      }
    }
    return { base: t('noMeaning'), ipa: '' };
  } catch(e) { return { base: '뜻을 찾지 못했어요', ipa: '' }; }
}

async function saveManualWords(bookId) {
  const pg = document.getElementById('manual-pg')?.value.trim();
  if (!pg) { toast('페이지 번호를 입력해주세요'); return; }
  if (!window._manualWords?.length) { toast('추가된 단어가 없어요'); return; }
  const btn = document.getElementById('manual-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = t('searchingMeaning'); btn.style.opacity = '0.6'; }
  toast('단어 뜻을 검색하는 중이에요...');
  for (let i = 0; i < window._manualWords.length; i++) {
    const w = window._manualWords[i];
    if (!w.base) { if (btn) btn.textContent = `${t('searchingMeaning')} (${i+1}/${window._manualWords.length})`; const result = await fetchWordMeaning(w.en); w.base = result.base; w.ipa = result.ipa; w.ctx = ''; }
  }
  const book = findBook(bookId); if (!book) return;
  const pid = await savePageWordsToDB(bookId, pg, window._manualWords);
  const words = window._manualWords.map((w, i) => ({ ...w, id: `${bookId}-${pg}-m${i+1}` }));
  const ex = findPage(book, pg);
  if (ex) ex.words = [...ex.words, ...words];
  else { book.pages.push({ num: pg, _pid: pid, words }); book.pages.sort((a,b) => String(a.num).localeCompare(String(b.num))); }
  toast(userNativeLang==='ko'?`Page ${pg} 저장 완료 (${words.length}개)`:`Page ${pg} saved (${words.length} words)`);
updateTotalWords();
  window._manualWords = [];
  replace({ name: 'page-words', bookId, pageNum: pg });
}

};

(function() {
  let startX = 0, startY = 0;
  document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = Math.abs(e.changedTouches[0].clientY - startY);
    if (dx > 60 && dy < 80 && startX < 40 && stack.length > 1) { back(); }
  }, { passive: true });
})();
